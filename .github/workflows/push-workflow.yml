---
name: Push Workflow
on:
  push:
    branches:
      - main
env:
  COURSE_NAME: "Code Platoon DevOps"
  COHORT: "AICO"
jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          test -f name.txt || exit 1
          test -f devops.txt || exit 1
          echo "All required files present"

  build:
    needs: setup
    runs-on: ubuntu-latest
    env:
      REPORT_TITLE: "AICO Week 11 Summary Report"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Main branch only step
        if: github.ref == 'refs/heads/main'
        run: |
          echo "This push landed on main"

      - name: Non-main branch step
        if: github.ref != 'refs/heads/main'
        run: |
          echo "This push landed on a feature branch"

      - name: Check which files changed
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            personal:
              - 'name.txt'
              - 'devops.txt'

      - name: Personal files changed step
        if: steps.changes.outputs.personal == 'true'
        run: |
          echo "name.txt or devops.txt was modified in this push"

      - name: Create log file
        id: create_log
        run: |
          echo "Workflow executed at $(date)" > log.txt

      - name: Cleanup on failure
        if: failure()
        run: |
          echo "A previous step failed - running cleanup"

      - name: Cohort conditional step
        if: env.COHORT == 'AICO'
        run: |
          echo "Running AICO-specific step"

      - name: Read personal files
        run: |
          echo "=== name.txt ==="
          cat name.txt
          echo "=== devops.txt ==="
          cat devops.txt

      - name: Display all variables
        run: |
          echo "COURSE_NAME: $COURSE_NAME"
          echo "COHORT: $COHORT"
          echo "REPORT_TITLE: $REPORT_TITLE"
          echo "Actor: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"

      - name: Generate summary report
        run: |
          echo "$REPORT_TITLE" > summary.txt
          echo "Course: $COURSE_NAME | Cohort: $COHORT" >> summary.txt
          echo "Triggered by: ${{ github.actor }}" >> summary.txt
          echo "Repository: ${{ github.repository }}" >> summary.txt
          echo "Generated: $(date)" >> summary.txt
          echo "---" >> summary.txt
          cat name.txt >> summary.txt
          cat devops.txt >> summary.txt

      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: summary-report
          path: summary.txt

  report:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download summary artifact
        uses: actions/download-artifact@v4
        with:
          name: summary-report

      - name: Display summary report
        run: |
          cat summary.txt

  matrix-test:
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        environment: [dev, prod]
    steps:
      - name: Print matrix configuration
        run: |
          echo "Running on OS: ${{ matrix.os }}"
          echo "Environment: ${{ matrix.environment }}"
