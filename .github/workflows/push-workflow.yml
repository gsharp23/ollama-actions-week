---
name: Push Workflow
on:
  push:
    branches:
      - main
env:
  COURSE_NAME: "Code Platoon DevOps"
  COHORT: "AICO"
jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          test -f name.txt || exit 1
          test -f devops.txt || exit 1
          echo "All required files present"

  build:
    needs: setup
    runs-on: ubuntu-latest
    env:
      REPORT_TITLE: "AICO Week 11 Summary Report"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create log file
        run: |
          echo "Workflow executed at $(date)" > log.txt

      - name: Print working directory
        run: |
          pwd

      - name: Display log contents
        run: |
          cat log.txt

      - name: Custom message
        run: |
          echo "Guy Sharp - AICO cohort - one green check at a time"

      - name: Read name file
        run: |
          echo "=== name.txt ==="
          cat name.txt

      - name: Read devops file
        run: |
          echo "=== devops.txt ==="
          cat devops.txt

      - name: Display all variables
        run: |
          echo "COURSE_NAME: $COURSE_NAME"
          echo "COHORT: $COHORT"
          echo "REPORT_TITLE: $REPORT_TITLE"
          echo "Actor: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"

      - name: Generate summary report
        run: |
          echo "$REPORT_TITLE" > summary.txt
          echo "Course: $COURSE_NAME | Cohort: $COHORT" >> summary.txt
          echo "Triggered by: ${{ github.actor }}" >> summary.txt
          echo "Repository: ${{ github.repository }}" >> summary.txt
          echo "Generated: $(date)" >> summary.txt
          echo "---" >> summary.txt
          cat name.txt >> summary.txt
          cat devops.txt >> summary.txt

      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: summary-report
          path: summary.txt

  report:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download summary artifact
        uses: actions/download-artifact@v4
        with:
          name: summary-report

      - name: Display summary report
        run: |
          cat summary.txt
